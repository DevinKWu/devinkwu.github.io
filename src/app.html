<!doctype html>
<html lang="zh-TW">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
	</head>
	<script>
		(function () {
			var ua = navigator.userAgent;
			var isLine = /Line/i.test(ua);
			if (!isLine) return;

			var isAndroid = /Android/i.test(ua);
			var isIOS = /iPhone|iPad|iPod/i.test(ua);

			if (isAndroid) {
				window.location.href =
					'intent://' +
					window.location.host +
					window.location.pathname +
					'#Intent;scheme=http;package=com.android.chrome;end';
				return;
			}

			if (isIOS) {
				// 嘗試跳轉外部瀏覽器（不保證成功）
				window.open(window.location.href, '_blank');

				// 顯示提示橫幅作為 fallback
				var banner = document.createElement('div');
				banner.id = 'line-redirect-banner';
				banner.style.cssText =
					'position:fixed;top:0;left:0;right:0;z-index:99999;' +
					'background:#fff;border-bottom:1px solid #ddd;' +
					'padding:12px 16px;display:flex;align-items:center;' +
					'gap:10px;font-family:sans-serif;font-size:14px;color:#333;' +
					'box-shadow:0 2px 8px rgba(0,0,0,.15);';
				banner.innerHTML =
					'<span style="flex:1">⚠️ 建議使用 Safari 開啟以獲得完整體驗。<br>' +
					'<small style="color:#666">點右上角 <b>[...]</b> → 在瀏覽器中開啟</small></span>' +
					'<button onclick="document.getElementById(\'line-redirect-banner\').remove()" ' +
					'style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px;color:#999">✕</button>';
				document.addEventListener('DOMContentLoaded', function () {
					document.body.prepend(banner);
				});
			}
		})();
	</script>
	<body data-sveltekit-prerender="true">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
